name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Derive version (Makefile-compatible)
        id: ver
        run: |
          # Match `make build`: BASE_VERSION (from Makefile) + UTC timestamp.
          BASE=$(awk -F '= *' '/^BASE_VERSION[[:space:]]*=/{print $2; exit}' Makefile)
          STAMP=$(date -u +%Y%m%d.%H%M%S)
          SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE}.${STAMP}+${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-X main.version=${{ steps.ver.outputs.version }} -s -w" \
            -o bin/wall-vault-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .
